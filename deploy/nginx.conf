# ─────────────────────────────────────────────────────────────────────────────
# Assay edge proxy (Docker-free). One public port fronts ALL THREE local services
# so the whole app is a single origin (no CORS, no mixed-content, no domain needed):
#     /        → web      (Next.js,  127.0.0.1:3000)  the UI
#     /api/*   → backend  (Express,  127.0.0.1:4000)  registry + ledger + payments
#     /agent/* → agent    (FastAPI,  127.0.0.1:8000)  POST /run SSE decision stream
#
# The web build bakes in same-origin relative paths:
#     NEXT_PUBLIC_BACKEND_URL = /api
#     NEXT_PUBLIC_AGENT_URL   = /agent
#
# Install: copy to /etc/nginx/sites-available/assay and symlink into sites-enabled.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # The agent /run stream stays open for a whole run.
    proxy_read_timeout  1h;
    proxy_send_timeout  1h;


    # ---- backend (registry / ledger / payments) --------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- agent (Server-Sent Events) --------------------------------------
    # SSE needs buffering OFF, or events arrive in one lump at the end.
    location /agent/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location = /healthz {
        default_type application/json;
        return 200 '{"ok":true,"edge":"assay-nginx"}';
    }

    # ---- web (Next.js UI) — must stay LAST so /api and /agent win first ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

